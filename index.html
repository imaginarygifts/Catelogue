<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imaginary Gifts Catalogue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/store.css">
</head>
<body>

<header class="topbar">

  <!-- LEFT: MENU -->
  <div class="menu-btn" onclick="toggleSidebar()">☰</div>


  <!-- CENTER: LOGO -->
  <div class="logo">Imaginary Gifts</div>

  <!-- RIGHT: SEARCH -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>

</header>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <div class="close-btn" onclick="toggleSidebar()">✕</div>

  <a href="#">Home</a>
  <a href="#">Categories</a>
  <a href="#">Orders</a>
  <a href="#">Contact</a>
</div>
<div id="overlay" class="overlay" onclick="toggleSidebar()"></div>




<div id="categoryBar" class="category-scroll"></div>
<div id="subCategoryBar" class="subcategory-row"></div>
<div class="tag-filter-row" id="tagFilterRow">
  <!-- Tags will load here -->
</div>

<main>
  <div id="productGrid" class="product-grid"></div>
</main>

<div id="shareBtn" onclick="sharePage()">🔗</div>

<script type="module" src="js/store.js"></script>
<script src="js/share.js"></script>
</body>
</html>
