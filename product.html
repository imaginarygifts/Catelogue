<!-- WhatsApp Order Form -->

    <input id="custPincode" placeholder="Pincode">

    <div class="wa-actions">
      <button onclick="closeWaForm()">Cancel</button>
      <button onclick="submitWaOrder()">Continue to WhatsApp</button>
    </div>
  </div>
</div>



<div class="sticky-order">

 <button class="order-btn" onclick="orderNow()">
