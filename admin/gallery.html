<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Image Gallery</title>

<link rel="stylesheet" href="../css/gallery.css">

</head>

<body>


<!-- HEADER -->

<div class="header">

<button class="backBtn" onclick="history.back()">←</button>

<h2>Image Gallery</h2>

</div>


<!-- BREADCRUMBS -->

<div id="breadcrumbs" class="breadcrumbs"></div>



<!-- GALLERY GRID -->

<div id="galleryGrid" class="galleryGrid"></div>



<!-- ACTION BUTTONS -->

<div class="actions">

<button onclick="createFolder()" class="btn">
+ Add Folder
</button>

<input
type="file"
id="fileInput"
multiple
accept="image/*"
style="display:none"
>

<button
onclick="document.getElementById('fileInput').click()"
class="btn"
>
+ Add Images
</button>

</div>



<!-- VIEWER -->

<div id="viewer" class="viewer">

<img id="viewerImg">

<button onclick="closeViewer()" class="closeViewer">←</button>

</div>



<script type="module" src="../js/gallery.js"></script>

</body>
</html>
