<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Gallery</title>

<link rel="stylesheet" href="../css/gallery.css">

</head>

<body>


<!-- HEADER -->

<div class="galleryHeader">

<button class="backBtn" onclick="goBack()">←</button>

<h2>Image Gallery</h2>

</div>



<!-- UPLOAD PANEL -->

<div class="uploadCard">

<select id="folderSelect" class="folderSelect">
<option value="">Select Folder</option>
</select>

<button class="gradient-btn" onclick="createFolder()">
+ New Folder
</button>

<input
type="file"
id="fileInput"
multiple
accept="image/*,.zip"
>

<button class="gradient-btn" onclick="uploadFiles()">
Upload Images
</button>

</div>



<!-- BREADCRUMBS -->

<div id="breadcrumbs" class="breadcrumbs"></div>



<!-- TOOLBAR -->

<div id="toolbar" class="toolbar" style="display:none">

<button class="danger-btn" onclick="deleteSelected()">
Delete
</button>

</div>



<!-- GALLERY GRID -->

<div id="galleryGrid" class="galleryGrid"></div>



<!-- IMAGE VIEWER -->

<div id="viewer" class="viewer" style="display:none">

<button class="viewerClose" onclick="closeViewer()">←</button>

<img id="viewerImg">

</div>



<!-- UPLOAD PROGRESS -->

<div id="uploadPopup" class="uploadPopup" style="display:none">

<div class="uploadBox">

<div class="progressBar">

<div id="uploadProgressBar"></div>

</div>

<div id="uploadPercent">0%</div>

</div>

</div>



<!-- ZIP SUPPORT -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>


<!-- GALLERY SCRIPT -->

<script type="module" src="../js/gallery.js"></script>


</body>
</html>
