<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Gallery</title>

<link rel="stylesheet" href="../css/gallery.css">

</head>

<body>


<div class="topbar">

<button onclick="goBack()">←</button>

<h2>Image Gallery</h2>

</div>



<div class="uploadBox">

<select id="folderSelect">
<option value="">Select Folder</option>
</select>

<button onclick="createFolder()">+ New Folder</button>

<input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.zip">

<button onclick="uploadFiles()">Upload Images</button>

</div>



<div id="breadcrumbs"></div>



<div id="toolbar">

<button onclick="deleteSelected()">Delete</button>


</div>



<div id="galleryGrid"></div>



<!-- FULLSCREEN VIEWER -->

<div id="viewer">

<button class="backBtn" onclick="closeViewer()">←</button>

<img id="viewerImg">

</div>



<!-- UPLOAD POPUP -->

<div id="uploadPopup">

<div class="uploadBoxPopup">

<h3>Uploading...</h3>

<div class="progressBarOuter">

<div id="uploadProgressBar"></div>

</div>

<div id="uploadPercent">0%</div>

</div>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script type="module" src="../js/gallery.js"></script>

</body>
</html>
