<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Image Gallery</title>

<link rel="stylesheet" href="../css/gallery.css">

</head>

<body>


<div class="header">

<button class="backBtn" onclick="history.back()">←</button>

<h2>Image Gallery</h2>

</div>


<div class="topBar">

<label class="selectAll">

<input type="checkbox" id="selectAll">

Select All

</label>

<button id="deleteBtn" onclick="deleteSelected()" style="display:none">
🗑 Delete
</button>

</div>


<div id="breadcrumbs" class="breadcrumbs"></div>

<div id="galleryGrid" class="galleryGrid"></div>


<div class="actions">

<button onclick="createFolder()" class="btn">
+ Add Folder
</button>

<input
type="file"
id="fileInput"
multiple
accept="image/*"
style="display:none"
>

<button
onclick="document.getElementById('fileInput').click()"
class="btn"
>
+ Add Images
</button>

</div>


<div id="viewer" class="viewer">

<img id="viewerImg">

<button onclick="closeViewer()" class="closeViewer">←</button>

</div>


<script type="module" src="../js/gallery.js"></script>

</body>
</html>
