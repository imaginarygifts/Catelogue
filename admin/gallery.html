<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/gallery.css">

<!-- ZIP Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

</head>

<body>

<div class="topbar">
<span class="back-btn" onclick="location.href='dashboard.html'">←</span>
<span class="title">Image Gallery</span>
</div>

<div class="container">
<h3>Upload Images</h3>

<div class="upload-box">

<input type="text" id="folderPath" placeholder="Folder path (example: mug/magic-mug)">

<input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.webp,.zip">

<div id="uploadStatus"></div>

<button class="upload-btn" onclick="startUpload()">
Upload Files
</button>

</div>

<h3>Gallery</h3>

<div id="galleryGrid" class="gallery-grid"></div>

</div>

<script type="module" src="../js/gallery.js"></script>

</body>
</html>
